name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # required by goreleaser to upload release assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    # setup-go@v6 defaults GOTOOLCHAIN=local; allow auto-download so the
    # go.mod-required toolchain is used regardless of the runner's Go.
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # goreleaser needs full history for changelog/version

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2" # pin to the config's version: 2 (avoids the 'latest' warning)
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
