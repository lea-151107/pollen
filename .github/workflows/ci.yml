name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    # setup-go@v6 defaults GOTOOLCHAIN=local; go.mod requires a newer Go
    # than the oldest matrix entry, so allow the toolchain to auto-download
    # (the pre-v6 behavior) instead of failing the older-Go jobs.
    env:
      GOTOOLCHAIN: auto
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.21', 'stable']
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: go build -o pollen .
