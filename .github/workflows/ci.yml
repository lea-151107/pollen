name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Test the go.mod minimum and latest stable. (The old '1.21' entry
        # never really tested 1.21 — go.mod requires a newer Go, so under
        # setup-go@v5 it silently auto-upgraded; setup-go@v6 defaults
        # GOTOOLCHAIN=local, so the version must satisfy go.mod directly.)
        go: ['1.26.3', 'stable']
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: go build -o pollen .
